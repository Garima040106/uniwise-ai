

services:
  web:
    build: .
    container_name: uniwise_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=uniwise-docker-secret-key
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:3b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: uniwise_db
    environment:
      - POSTGRES_DB=uniwise_db
      - POSTGRES_USER=uniwise_user
      - POSTGRES_PASSWORD=uniwise_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  media_volume:
  static_volume:
